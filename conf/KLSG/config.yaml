model:
  type: HSSD-mamba
  kwargs:
    pd_a: 5
    pd_b: 2
    pd_pad: 0
    R3: True
    R3_T: 8
    R3_p: 0.16
    in_ch: 1
    bsn_base_ch: 128
    bsn_num_module: 9
    is_refine: True
    sematic_type: ResNet

model_input: [noisy] # e.g.) real_noisy, syn_noisy, clean
model_type: only_denoise

trainer: Trainer

training:
  dataset: prep_KLSG_Train
  dataset_args:
    # ！！！请确保这里的训练路径是正确的！！！

    add_noise: None # e.g.) None bypass uni-15. gau-15. gau_blind-10.:50. het_gau-10.:50. see more detail in denoise_dataset.py
    crop_size: [160, 160]
    aug: ['hflip', 'rot']
    n_repeat: 1
  
  # --- 以下是所有被放错位置的训练设置 ---
  batch_size: 4
  max_epoch: 156
  init_lr: 5e-6
  scheduler:
    type: Cosine
    min: 5e-7
  loss: 1*self_L1
  tmp_info: []
  optimizer:
    type: Adam
    Adam:
      betas: [0.9, 0.999]
  warmup: True  # default False
  warmup_iter: 200

validation:
  # --- 这是一个合并和修正后的 validation 块 ---
  # 我假设您想用 KLSG_Val 来做验证 (您在第一个块里写的)
  dataset: KLSG_Val 
  dataset_args:
    # ！！！请确保这里的验证路径是正确的！！！
    dataset_path: "/root/autodl-tmp/HSSD-mamba-main/dataset/prep/KLSG_Val/RN" 
    crop_size: None 
    add_noise: None 
    n_data: None

  crop: 160
  add_con: 0.5
  floor: True

  val: False
  save_image: True

  start_epoch: 8
  interval_epoch: 16

checkpoint:
  save: True
  start_epoch: 1
  interval_epoch: 18

log:
  interval_iter: 10

test:
  dataset: KLSG_Test
  dataset_args:
    # ！！！也请检查您的测试集路径！！！
    dataset_path: "/root/autodl-tmp/HSSD-mamba-main/dataset/KLSG/test"
    crop_size: None # [64, 64]
    add_noise: None # e.g.) None uni-15. gau-15. gau_blind-10.:50. poi_gau-10.:50.

  crop: 160
  add_con: 0.5
  floor: True
  save_image: True